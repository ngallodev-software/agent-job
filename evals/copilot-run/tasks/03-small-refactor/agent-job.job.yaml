# Replace repo_path if your checkout lives somewhere other than /lump/apps/invoke-codex-from-claude.
schema_version: 2
id: EVAL-03-SMALL-REFACTOR
title: Small readability refactor in report formatter
repo_path: /lump/apps/invoke-codex-from-claude/evals/copilot-run/fixtures/sample-repo
branch: null

task:
  type: refactor
  objective: >
    Improve the readability of the _normalize_lines helper in report_formatter.py without
    changing external behavior.
  context: |
    The fixture includes a deliberately small refactor target in _normalize_lines. This task
    should not add new output features, reformat the whole file, or alter behavior beyond the
    intended readability cleanup.
  constraints:
    - Keep the refactor narrow.
    - Do not change report output behavior.
    - Do not introduce new features.
    - Do not auto-commit changes.
    - Do not auto-push to remote.
  acceptance_criteria:
    - The refactor improves readability in a bounded part of report_formatter.py.
    - Existing report formatter behavior remains unchanged.
    - Relevant formatter tests are run and reported.

scope:
  allowed_paths:
    - src/report_formatter.py
    - tests/test_report_formatter.py
  forbidden_paths:
    - README.md
    - src/calculator.py
    - src/path_policy.py

execution:
  mode: agent
  preferred_executor: copilot
  model_tier: medium
  allowed_executors:
    - copilot
    - human
  disallowed_executors:
    - codex
    - mock
  commands_allowed:
    - python3
    - git
  commands_forbidden:
    - git push
    - git reset --hard
    - rm -rf
  test_commands:
    - python3 -m unittest tests.test_report_formatter

output_contract:
  require_summary: true
  require_changed_files: true
  require_tests_run: true
  require_risks: true
  human_review_required: true

provenance:
  distinguish_agent_claims: true
  require_changed_file_snapshot: true
  require_test_evidence: true

created_by: human
created_at: 2026-05-03T00:00:00Z

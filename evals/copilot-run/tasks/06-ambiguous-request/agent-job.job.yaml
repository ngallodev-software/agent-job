schema_version: 2
id: EVAL-06-AMBIGUOUS-REQUEST
title: Improve report output for sparse input without redesigning formatter
repo_path: /lump/apps/invoke-codex-from-claude/evals/copilot-run/fixtures/sample-repo
branch: null

task:
  type: implementation
  objective: >
    Improve render_report output so sparse input is handled more cleanly, especially when summary
    text is blank or only whitespace.
  context: |
    This task is intentionally somewhat ambiguous in plain language. The structured version
    should reduce ambiguity and scope creep. The target is not a redesign. Keep the change
    bounded to render_report sparse-input behavior.
  constraints:
    - Do not redesign the formatter.
    - Keep the change focused on sparse or blank summary handling.
    - Avoid unrelated cleanup.
    - Do not auto-commit changes.
    - Do not auto-push to remote.
  acceptance_criteria:
    - Blank or whitespace-only summary input is handled more cleanly.
    - Existing non-empty report formatting remains intact.
    - Relevant formatter tests are run and reported.

scope:
  allowed_paths:
    - src/report_formatter.py
    - tests/test_report_formatter.py
  forbidden_paths:
    - README.md
    - src/calculator.py
    - src/path_policy.py

execution:
  mode: agent
  preferred_executor: copilot
  model_tier: medium
  allowed_executors:
    - copilot
    - human
  disallowed_executors:
    - codex
    - mock
  commands_allowed:
    - python3
    - git
  commands_forbidden:
    - git push
    - git reset --hard
    - rm -rf
  test_commands:
    - python3 -m unittest tests.test_report_formatter

output_contract:
  require_summary: true
  require_changed_files: true
  require_tests_run: true
  require_risks: true
  human_review_required: true

provenance:
  distinguish_agent_claims: true
  require_changed_file_snapshot: true
  require_test_evidence: true


title: Update root README to present agent-job as canonical
repo_path: /lump/apps/invoke-codex-from-claude
branch: fix/re-org

task:
  type: docs
  objective: >
    Rewrite the root README.md to present agent-job as the canonical CLI interface,
    document the Copilot package workflow, and provide clear migration guidance from codex-job.
  context: |
    Phase A implementation is complete. The repository now has a universal agent-job CLI that
    supports Copilot, manual, and Codex workflows. The old codex-job CLI still exists but
    should be presented as legacy/compatibility mode.

    Current README presents codex-job as the primary interface. This needs to change to
    reflect the new universal architecture while maintaining backwards compatibility information.
  constraints:
    - Do not remove existing codex-job documentation entirely; move to compatibility section.
    - Keep README concise and scannable.
    - Include a clear table showing supported modes.
    - Do not auto-commit changes.
    - Do not auto-push to remote.
  acceptance_criteria:
    - README title presents agent-job as canonical
    - Copilot package workflow is documented
    - Supported modes table included
    - Migration section from codex-job included
    - Quick start uses agent-job commands

